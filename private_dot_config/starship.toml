# Replace the "έζψ" symbol in the prompt with "έηε"
[character]
symbol = "έηε"

# Configure the number of directories to truncate in the current path
[directory]
truncation_length = 3
truncate_to_repo = true
style = "blue"

# Configure the duration of the last command
[cmd_duration]
min_time = 100
style = "dimmed white"
disabled = true

# Configure the Git prompt
[git_branch]
style = "green"

# Configure the Git symbols
[git_status]
conflicted = " ΎΔυ "
deleted = " Ύτπ"
modified = " ΎΖΜ "
stashed = " ΌΚΑ "
staged = " ΎΔ╛ "
renamed = " ΎΣγ "
untracked = " ΎΒβ "
format = '([\[$all_status$ahead_behind\]]($style) )'
show_sync_count = true
conflicted_count.enabled = true
deleted_count.enabled = true
modified_count.enabled = true
stashed_count.enabled = true
staged_count.enabled = true
renamed_count.enabled = true
untracked_count.enabled = true

# Configure the SSH prompt
[hostname]
ssh_only = true
format = "[$hostname]($style) in"

# Configure the battery display
[battery]
full_symbol = "ΎΚΑ"
charging_symbol = "ΎΨΘ"
discharging_symbol = "ΎΚΕ"

# Configure the background jobs
[jobs]
symbol = "ΎΡμ"

# Configure the package version
[package]
symbol = "ΎμΨ "
style = "dimmed white"

# Configure the .NET module
[dotnet]
symbol = "Όζ┐ "
style = "dimmed blue"

# Configure the Rust module
[rust]
symbol = "Όηρ "
style = "dimmed red"

# Configure the Node.js module
[nodejs]
symbol = "Ύλα "
style = "dimmed green"

# Configure the Java module
[java]
symbol = "ΌΚΨ "
style = "dimmed purple"
